<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無限スロット</title>
    <link rel="stylesheet" href="stylesheet/main.css">
    <style></style>
</head>
<body>

    <h1>無 限 ス ロ ッ ト</h1>

    <div class="wrapper-star" id="js-wrapper-star"></div>

    <div class="money">
        <p>所持金: <span id="js-money">0</span>円</p>
        <p>1秒あたりの獲得量: <span id="js-unit-money">0</span>円</p>
    </div>

    <div class="wrapper-center">
        <div class="enforce">
            <div>
                <label>所持金</label>
                <button><span id="js-price-money"></span>円</button>
            </div>
            <div>
                <label>所持金獲得量</label>
                <button><span id="js-price-money-increase"></span>円</button>
            </div>
            <div>
                <label>スロット強化</label>
                <button><span id="js-price-slot-enforce"></span>円</button>
            </div>
            <div>
                <label>スロット間隔短縮</label>
                <button><span id="js-price-slot-shorten"></span>円</button>
            </div>
            <div>
                <label>オートスロット</label>
                <button><span id="js-price-auto-slot"></span>円</button>
            </div>
        </div>
        <div class="slot" id="js-slot"></div>
    </div>

    <div class="button-start">
        <button class="start" id="js-button-start">回す</button>
    </div>

    <div class="button-reset">
        <button class="reset" id="js-button-reset">リセット</button>
    </div>

    <script src="/main.js"></script>
</body>
</html>
